name: ARIA Daily Pipeline

on:
  schedule:
    # Runs at 13:00 UTC (6:30 PM IST) every day
    - cron: '0 13 * * *'
  workflow_dispatch: # Allows manual trigger from the Actions tab

# -----------------------------------------------------------------------
# Permissions: all required scopes declared explicitly
# - contents: write   → push commits and branches
# - pull-requests: write → create and merge PRs
# - pages: write      → deploy GitHub Pages
# - id-token: write   → required for Pages OIDC auth
# -----------------------------------------------------------------------
permissions:
  contents: write
  pull-requests: write
  pages: write
  id-token: write

jobs:

  # ─────────────────────────────────────────────────────────────────────
  # JOB 1: Run the ARIA pipeline and publish results via a PR
  # ─────────────────────────────────────────────────────────────────────
  run-pipeline:
    runs-on: ubuntu-latest
    # Expose state to the deploy-pages job
    outputs:
      has_changes: ${{ steps.check_changes.outputs.has_changes }}

    steps:
      # -----------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # Full history needed for rebase/branching

      # -----------------------------------------------------------------
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # -----------------------------------------------------------------
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # -----------------------------------------------------------------
      - name: Run ARIA Pipeline
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          NOTIFY_MODE: 'True'
        run: |
          # Fast-fail if mandatory secrets are missing
          if [ -z "$GROQ_API_KEY" ]; then
            echo "::error::GROQ_API_KEY secret is not set. Aborting."
            exit 1
          fi
          if [ -z "$TAVILY_API_KEY" ]; then
            echo "::error::TAVILY_API_KEY secret is not set. Aborting."
            exit 1
          fi
          python main.py

      # -----------------------------------------------------------------
      # Commit changes, rebase against latest quality, and merge via PR.
      # Hardened against concurrency conflicts.
      - name: Commit and Open PR
        id: check_changes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Stage outputs (reports and database)
          git add memory/chroma_db/ reports/ || true

          # Check for staged changes
          if git diff-index --quiet HEAD; then
            echo "No changes to commit — skipping PR creation."
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            # 1. Create unique branch
            BRANCH_NAME="auto-update-$(date +'%Y-%m-%d')-${{ github.run_id }}"
            git checkout -b "$BRANCH_NAME"
            git commit -m "chore(auto): Update ChromaDB memory and daily HTML dashboard [skip ci]"

            # 2. Sync with remote 'quality' to handle any changes since run started
            echo "Syncing with remote quality branch..."
            git fetch origin quality
            
            # 3. Pull latest quality and rebase our changes on top (auto-resolves simple DB updates)
            # If rebase fails (rare), we fall back to overwriting to ensure the daily run wins.
            git rebase origin/quality || {
              echo "::warning::Rebase failed, forcing update with current run data."
              git rebase --abort
              git checkout $BRANCH_NAME
            }

            # 4. Push the branch
            git push origin "$BRANCH_NAME" --force-with-lease

            # 5. Create PR targeting 'quality'
            PR_URL=$(gh pr create \
              --base quality \
              --head "$BRANCH_NAME" \
              --title "📡 ARIA Daily Radar Update: $(date +'%Y-%m-%d')" \
              --body "Automated daily pipeline run. Updates ChromaDB memory and HTML dashboard. [Run #${{ github.run_number }}]")

            echo "PR Created: $PR_URL"

            # 6. Merge immediately using Squash for clean history
            # --delete-branch cleans up the daily branch after merge
            gh pr merge "$BRANCH_NAME" --squash --delete-branch

            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      # -----------------------------------------------------------------
      - name: Setup GitHub Pages Artifact
        run: |
          mkdir -p public
          LATEST_HTML=$(ls -t reports/*.html 2>/dev/null | head -n1)
          if [ -z "$LATEST_HTML" ]; then
            echo "<html><body><h1>ARIA — No report available yet.</h1></body></html>" > public/index.html
          else
            cp "$LATEST_HTML" public/index.html
          fi

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public/

  # ─────────────────────────────────────────────────────────────────────
  # JOB 2: Deploy to GitHub Pages
  # ─────────────────────────────────────────────────────────────────────
  deploy-pages:
    needs: run-pipeline
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
