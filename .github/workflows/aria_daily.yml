name: ARIA Daily Pipeline

on:
  schedule:
    # Runs at 13:00 UTC (6:30 PM IST) every day
    - cron: '0 13 * * *'
  workflow_dispatch: # Allows you to run it manually from the Actions tab

permissions:
  contents: write      # Required to push the updated database and HTML report back to the repo
  pages: write         # Required to deploy the HTML report to GitHub Pages
  id-token: write      # Required for GitHub Pages
  pull-requests: write # Required for the 'gh pr' command to create and merge PRs

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Important for committing back to the repo

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run ARIA Pipeline
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
          # We don't necessarily need Gemini if you're using Groq for Analyst, 
          # but we map it just in case:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          NOTIFY_MODE: 'True'
        run: |
      - name: Debug Fetchers
        env:
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
        run: |
          python -c "
          import asyncio
          from fetchers.hackernews import fetch_hackernews
          from fetchers.github_trending import fetch_github_trending
          from fetchers.arxiv import fetch_arxiv
          from fetchers.aws_blog import fetch_aws_blog
          from fetchers.tavily_search import fetch_tavily
          
          async def test():
              print('Testing HN...')
              try: await asyncio.wait_for(fetch_hackernews(), timeout=20)
              except Exception as e: print(f'HN failed/timeout: {e}')
              
              print('Testing GH...')
              try: await asyncio.wait_for(fetch_github_trending(), timeout=20)
              except Exception as e: print(f'GH failed/timeout: {e}')
              
              print('Testing ArXiv...')
              try: await asyncio.wait_for(fetch_arxiv(), timeout=20)
              except Exception as e: print(f'ArXiv failed/timeout: {e}')
              
              print('Testing AWS...')
              try: await asyncio.wait_for(fetch_aws_blog(), timeout=20)
              except Exception as e: print(f'AWS failed/timeout: {e}')
              
              print('Testing Tavily...')
              try: await asyncio.wait_for(fetch_tavily(), timeout=20)
              except Exception as e: print(f'Tavily failed/timeout: {e}')
              
              print('All fetch tests done.')
              
          asyncio.run(test())
          "

      - name: Run ARIA Pipeline
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          NOTIFY_MODE: 'True'
        run: |
          # The script will output HTML to /reports/ and update DB in /memory/
          python main.py

      - name: Commit Updated Database and Reports
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # Create a new daily branch
          BRANCH_NAME="auto-update-$(date +'%Y-%m-%d')"
          git checkout -b "$BRANCH_NAME"
          
          # Add the database and reports
          git add memory/chroma_db/
          git add reports/
          
          # Only commit/PR if there are changes
          if git diff-index --quiet HEAD; then
            echo "No changes to commit"
          else
            git commit -m "chore(auto): Update ChromaDB memory and daily HTML dashboard"
            git push origin "$BRANCH_NAME"
            
            # Create a Pull Request against the 'quality' branch
            gh pr create \
              --base quality \
              --head "$BRANCH_NAME" \
              --title "📡 ARIA Daily Radar Update: $(date +'%Y-%m-%d')" \
              --body "This PR contains the automated daily run for ARIA. It updates the ChromaDB memory and generates the new HTML dashboard for GitHub Pages."
              
            # Enable auto-merge for the newly created PR
            gh pr merge "$BRANCH_NAME" --auto --merge
          fi

      - name: Setup GitHub Pages Deployment
        # Move the latest HTML report to an index.html file so it serves cleanly at your root URL
        run: |
          mkdir -p public
          # Find the newest HTML file in reports and copy it to public/index.html
          LATEST_HTML=$(ls -t reports/*.html | head -n1)
          cp "$LATEST_HTML" public/index.html

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public/

  deploy-pages:
    needs: run-pipeline
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
