name: ARIA Daily Pipeline

on:
  schedule:
    # Runs at 13:00 UTC (6:30 PM IST) every day
    - cron: '0 13 * * *'
  workflow_dispatch: # Allows manual trigger from the Actions tab

# -----------------------------------------------------------------------
# Permissions: all required scopes declared explicitly
# - contents: write   → push commits and branches
# - pull-requests: write → create and merge PRs
# - pages: write      → deploy GitHub Pages
# - id-token: write   → required for Pages OIDC auth
# -----------------------------------------------------------------------
permissions:
  contents: write
  pull-requests: write
  pages: write
  id-token: write

jobs:

  # ─────────────────────────────────────────────────────────────────────
  # JOB 1: Run the ARIA pipeline and publish results via a PR
  # ─────────────────────────────────────────────────────────────────────
  run-pipeline:
    runs-on: ubuntu-latest
    # Expose the branch name to the deploy-pages job
    outputs:
      has_changes: ${{ steps.check_changes.outputs.has_changes }}

    steps:
      # -----------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # Full history needed for branch operations

      # -----------------------------------------------------------------
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # -----------------------------------------------------------------
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # -----------------------------------------------------------------
      # Run the pipeline. Each API key is validated before the script
      # runs so the step fails fast with a clear error if a secret is missing.
      - name: Run ARIA Pipeline
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          NOTIFY_MODE: 'True'
        run: |
          # Fast-fail if mandatory secrets are missing
          if [ -z "$GROQ_API_KEY" ]; then
            echo "::error::GROQ_API_KEY secret is not set. Aborting."
            exit 1
          fi
          if [ -z "$TAVILY_API_KEY" ]; then
            echo "::error::TAVILY_API_KEY secret is not set. Aborting."
            exit 1
          fi
          python main.py

      # -----------------------------------------------------------------
      # Create a uniquely-named branch, commit any changes, and open a PR
      # against 'quality'. If there are no changes, skip gracefully.
      - name: Commit and Open PR
        id: check_changes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Stage outputs
          git add memory/chroma_db/ reports/ || true

          # Check for staged changes
          if git diff-index --quiet HEAD; then
            echo "No changes to commit — skipping PR creation."
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            # Unique branch name: date + run ID prevents collisions on re-runs
            BRANCH_NAME="auto-update-$(date +'%Y-%m-%d')-${{ github.run_id }}"

            git checkout -b "$BRANCH_NAME"
            git commit -m "chore(auto): Update ChromaDB memory and daily HTML dashboard [skip ci]"

            # Push the new branch
            git push origin "$BRANCH_NAME"

            # Create PR targeting 'quality'
            gh pr create \
              --base quality \
              --head "$BRANCH_NAME" \
              --title "📡 ARIA Daily Radar Update: $(date +'%Y-%m-%d')" \
              --body "Automated daily pipeline run. Updates ChromaDB memory and HTML dashboard for GitHub Pages."

            # Merge immediately — no --auto flag (not needed without required checks)
            # --delete-branch cleans up the daily branch after merge
            gh pr merge "$BRANCH_NAME" --merge --delete-branch

            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      # -----------------------------------------------------------------
      # Always prepare the Pages artifact, even if no new report was generated.
      # Falls back gracefully if the reports/ directory is empty.
      - name: Setup GitHub Pages Artifact
        run: |
          mkdir -p public
          # Find the newest HTML report
          LATEST_HTML=$(ls -t reports/*.html 2>/dev/null | head -n1)
          if [ -z "$LATEST_HTML" ]; then
            echo "::warning::No HTML reports found in reports/ — creating placeholder page."
            echo "<html><body><h1>ARIA — No report available yet.</h1></body></html>" > public/index.html
          else
            cp "$LATEST_HTML" public/index.html
            echo "Using report: $LATEST_HTML"
          fi

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public/

  # ─────────────────────────────────────────────────────────────────────
  # JOB 2: Deploy to GitHub Pages (runs even if no new changes were committed)
  # ─────────────────────────────────────────────────────────────────────
  deploy-pages:
    needs: run-pipeline
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
